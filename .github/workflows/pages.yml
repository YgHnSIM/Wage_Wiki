name: Deploy Wage Wiki to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"

      - name: Compile tools
        run: python -m py_compile scripts/*.py

      - name: Check browser script syntax
        run: node --check web/assets/app.js

      - name: Run unit tests
        run: python -m unittest discover -s scripts/tests -v

      - name: Validate QA regression catalogue
        run: python scripts/check_qa_regression.py

      - name: Lint wiki
        run: python scripts/lint_wiki.py --output build/lint-report.json --strict-v13 --fail-on high

      - name: Check raw manifest
        run: python scripts/build_manifest.py --check sources/raw-manifest.jsonl --output build/raw-manifest.jsonl

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build static website
        run: >-
          python scripts/build_site.py
          --output build/site
          --site-url "${{ steps.pages.outputs.base_url }}/"
          --repository-url "${{ github.server_url }}/${{ github.repository }}"
          --branch "${{ github.ref_name }}"

      - name: Check generated website
        run: python scripts/check_site.py build/site --output build/site-check.json

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: build/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
