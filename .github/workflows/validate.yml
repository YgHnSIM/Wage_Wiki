name: Validate legal knowledge graph

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Compile tools
        run: python -m py_compile scripts/*.py

      - name: Check browser script syntax
        run: node --check web/assets/app.js

      - name: Run unit tests
        run: python -m unittest discover -s scripts/tests -v

      - name: Validate all commit messages
        run: python scripts/check_commit_messages.py --all --output build/commit-message-report.json

      - name: Validate QA regression catalogue
        run: python scripts/check_qa_regression.py

      - name: Lint wiki and QA regression set
        run: python scripts/lint_wiki.py --output build/lint-report.json --strict-v13 --fail-on high

      - name: Build raw manifest
        run: python scripts/build_manifest.py --check sources/raw-manifest.jsonl --output build/raw-manifest.jsonl

      - name: Build dashboard
        run: python scripts/build_dashboard.py --output build/dashboard.md

      - name: Export graph
        run: python scripts/export_graph.py --output build/graph.json

      - name: Build and smoke-test FTS search index
        run: |
          python scripts/build_search_index.py --chunks build/chunks.jsonl --database build/wage_wiki.sqlite
          python scripts/search_wiki.py "통상임금" --database build/wage_wiki.sqlite --include-review --include-historical --limit 3

      - name: Build and check static website
        run: |
          python scripts/build_site.py --output build/site --site-url "https://example.invalid/Wage_Wiki/"
          python scripts/check_site.py build/site --output build/site-check.json

      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: validation-artifacts
          path: build/
